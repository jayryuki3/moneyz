<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneyz Arbitrage Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <h1 class="text-2xl font-bold text-slate-800">Moneyz Arbitrage Bot</h1>
                <span id="status-badge" class="px-3 py-1 rounded-full text-sm font-semibold bg-gray-200 text-gray-800">Loading...</span>
                <span id="mode-badge" class="px-3 py-1 rounded-full text-sm font-semibold bg-purple-100 text-purple-800">Mode: ?</span>
            </div>
            <div class="flex space-x-3">
                <button id="btn-start" onclick="startBot()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md font-medium transition-colors disabled:opacity-50">
                    Start Bot
                </button>
                <button id="btn-stop" onclick="stopBot()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-md font-medium transition-colors disabled:opacity-50">
                    Stop Bot
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- Status Card -->
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50">
                    <h2 class="text-lg font-semibold text-slate-800">Status & Scanner</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-4 rounded border border-slate-100">
                            <p class="text-sm text-slate-500 font-medium whitespace-nowrap">Running</p>
                            <p id="val-running" class="text-xl font-bold text-slate-800 mt-1">...</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded border border-slate-100">
                            <p class="text-sm text-slate-500 font-medium whitespace-nowrap">Last Scan</p>
                            <p id="val-last-scan" class="text-sm font-bold text-slate-800 mt-1 truncate">...</p>
                        </div>
                    </div>

                    <div class="mt-4">
                        <h3 class="text-sm font-semibold text-slate-700 mb-2">Recent Opportunities</h3>
                        <div id="opportunities-list" class="bg-slate-50 border border-slate-200 rounded p-4 h-32 overflow-y-auto text-sm space-y-2">
                            <p class="text-slate-500 italic">Waiting for scan data...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Settings Card -->
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50">
                    <h2 class="text-lg font-semibold text-slate-800">Modes & Keys</h2>
                </div>
                <form id="settings-form" onsubmit="saveSettings(event)" class="p-6 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Mode</label>
                            <select id="input-mode" name="mode" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border border-slate-300">
                                <option value="paper">Paper Trading</option>
                                <option value="live">Live Trading</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Venue</label>
                            <select id="input-venue" name="venue" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border border-slate-300">
                                <option value="polymarket">Polymarket</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700">Polymarket API Key</label>
                        <input type="text" id="input-apiKey" name="apiKey" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border border-slate-300" placeholder="Your API Key">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Secret</label>
                        <input type="password" id="input-secret" name="secret" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border border-slate-300" placeholder="Your Secret">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Passphrase</label>
                        <input type="password" id="input-passphrase" name="passphrase" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border border-slate-300" placeholder="Your Passphrase">
                    </div>

                    <div class="pt-2">
                        <button type="submit" id="btn-save" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition-colors">
                            Save Settings
                        </button>
                    </div>
                </form>
            </div>

            <!-- Trades / PL Card -->
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50">
                    <h2 class="text-lg font-semibold text-slate-800">Executions & Pnl</h2>
                </div>
                <div class="p-0">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Time</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Market</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Strategy</th>
                                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">Size / Edge</th>
                                </tr>
                            </thead>
                            <tbody id="trades-tbody" class="bg-white divide-y divide-slate-200">
                                <tr><td colspan="4" class="px-6 py-4 text-center text-sm text-slate-500">Loading trades...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Logs Card -->
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-slate-800">System Logs</h2>
                    <span class="flex h-3 w-3">
                      <span id="log-ping" class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-emerald-400 opacity-75 hidden"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                </div>
                <div class="p-0">
                    <div id="logs-window" class="bg-slate-900 text-emerald-400 font-mono text-xs p-4 h-80 overflow-y-auto leading-relaxed">
                        Loading logs...
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        let lastLogsCount = 0;

        // --- API Requests ---

        async function fetchSettings() {
            try {
                const res = await fetch('/api/settings');
                if (!res.ok) throw new Error('Failed to fetch settings');
                const data = await res.json();

                document.getElementById('input-mode').value = data.mode || 'paper';
                document.getElementById('input-venue').value = data.venue || 'polymarket';
                document.getElementById('input-apiKey').value = data.keys?.polymarket?.apiKey || '';
                document.getElementById('input-secret').value = data.keys?.polymarket?.secret || '';
                document.getElementById('input-passphrase').value = data.keys?.polymarket?.passphrase || '';

                document.getElementById('mode-badge').innerText = `Mode: ${data.mode === 'live' ? 'LIVE' : 'PAPER'}`;
                document.getElementById('mode-badge').className = data.mode === 'live' 
                    ? 'px-3 py-1 rounded-full text-sm font-semibold bg-rose-100 text-rose-800' 
                    : 'px-3 py-1 rounded-full text-sm font-semibold bg-purple-100 text-purple-800';

            } catch (err) {
                console.error(err);
            }
        }

        async function saveSettings(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.innerText = 'Saving...';
            btn.disabled = true;

            const payload = {
                mode: document.getElementById('input-mode').value,
                venue: document.getElementById('input-venue').value,
                keys: {
                    polymarket: {
                        apiKey: document.getElementById('input-apiKey').value,
                        secret: document.getElementById('input-secret').value,
                        passphrase: document.getElementById('input-passphrase').value
                    }
                }
            };

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('Failed to save');
                await fetchSettings();
                alert('Settings saved successfully!');
            } catch (err) {
                alert('Error saving settings: ' + err.message);
            } finally {
                btn.innerText = 'Save Settings';
                btn.disabled = false;
            }
        }

        async function startBot() {
            try {
                await fetch('/api/start', { method: 'POST' });
                fetchDashboardData();
            } catch (err) {
                console.error('Failed to start:', err);
            }
        }

        async function stopBot() {
            try {
                await fetch('/api/stop', { method: 'POST' });
                fetchDashboardData();
            } catch (err) {
                console.error('Failed to stop:', err);
            }
        }

        async function fetchDashboardData() {
            try {
                const [statusRes, logsRes, tradesRes] = await Promise.all([
                    fetch('/api/status').catch(() => null),
                    fetch('/api/logs').catch(() => null),
                    fetch('/api/trades').catch(() => null)
                ]);

                // Handle Status
                if (statusRes && statusRes.ok) {
                    const status = await statusRes.json();
                    const isRunning = status.isRunning;

                    // Badges
                    const badge = document.getElementById('status-badge');
                    badge.innerText = isRunning ? 'Running' : 'Stopped';
                    badge.className = isRunning 
                        ? 'px-3 py-1 rounded-full text-sm font-semibold bg-emerald-100 text-emerald-800'
                        : 'px-3 py-1 rounded-full text-sm font-semibold bg-gray-200 text-gray-800';

                    document.getElementById('val-running').innerText = isRunning ? 'Yes' : 'No';
                    document.getElementById('val-running').className = isRunning 
                        ? 'text-xl font-bold text-emerald-600 mt-1'
                        : 'text-xl font-bold text-gray-500 mt-1';

                    document.getElementById('val-last-scan').innerText = status.lastScan 
                        ? new Date(status.lastScan).toLocaleTimeString()
                        : 'Never';

                    // Buttons
                    document.getElementById('btn-start').disabled = isRunning;
                    document.getElementById('btn-start').className = isRunning 
                        ? 'bg-emerald-600/50 text-white px-4 py-2 rounded-md font-medium cursor-not-allowed'
                        : 'bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md font-medium transition-colors';

                    document.getElementById('btn-stop').disabled = !isRunning;
                    document.getElementById('btn-stop').className = !isRunning 
                        ? 'bg-rose-600/50 text-white px-4 py-2 rounded-md font-medium cursor-not-allowed'
                        : 'bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-md font-medium transition-colors';

                    // Opportunities
                    const oppsDiv = document.getElementById('opportunities-list');
                    if (!status.recentOpportunities || status.recentOpportunities.length === 0) {
                        oppsDiv.innerHTML = '<p class="text-slate-500 italic">No recent opportunities found.</p>';
                    } else {
                        oppsDiv.innerHTML = status.recentOpportunities.map(opp => `
                            <div class="border-b border-slate-200 pb-2 mb-2 last:border-0 last:pb-0 last:mb-0">
                                <div class="flex justify-between">
                                    <span class="font-medium text-slate-700 truncate min-w-0 pr-2">${opp.marketTitle || 'Unknown Market'}</span>
                                    <span class="text-emerald-600 font-bold shrink-0">Sum: ${opp.sum.toFixed(4)}</span>
                                </div>
                                <div class="flex justify-between text-xs text-slate-500 mt-1">
                                    <span>Expected Margin: ${(opp.edge * 100).toFixed(2)}%</span>
                                    <span>${new Date(opp.timestamp).toLocaleTimeString()}</span>
                                </div>
                            </div>
                        `).join('');
                    }
                }

                // Handle Trades
                if (tradesRes && tradesRes.ok) {
                    const tradesData = await tradesRes.json();
                    const trades = tradesData.trades || [];
                    const tbody = document.getElementById('trades-tbody');
                    if (!trades || trades.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-sm text-slate-500 italic">No paper trades executed yet.</td></tr>';
                    } else {
                        tbody.innerHTML = trades.reverse().map(trade => `
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${new Date(trade.timestamp).toLocaleTimeString()}</td>
                                <td class="px-6 py-4 text-sm font-medium text-slate-900 truncate max-w-[200px]" title="${trade.marketTitle || '-'}">${trade.marketTitle || '-'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                                        ${trade.strategy}
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900 text-right">
                                    <div class="font-medium">Size: ${trade.size}</div>
                                    <div class="text-emerald-600 text-xs">+${(trade.profitExpected * 100).toFixed(2)}%</div>
                                </td>
                            </tr>
                        `).join('');
                    }
                }

                // Handle Logs
                if (logsRes && logsRes.ok) {
                    const logsData = await logsRes.json();
                    const logs = logsData.logs || [];
                    if (logs.length > lastLogsCount) {
                        const logsWin = document.getElementById('logs-window');

                        // Ping animation for new logs
                        const ping = document.getElementById('log-ping');
                        ping.classList.remove('hidden');
                        setTimeout(() => ping.classList.add('hidden'), 1000);

                        logsWin.innerHTML = logs.map(log => {
                            const time = new Date(log.timestamp).toLocaleTimeString();
                            let msg = log.message;
                            if (msg.includes('Arbitrage found')) {
                                msg = `<span class="text-yellow-400 font-bold">${msg}</span>`;
                            } else if (msg.includes('error') || msg.toLowerCase().includes('failed')) {
                                msg = `<span class="text-rose-400">${msg}</span>`;
                            } else if (msg.includes('Executing')) {
                                msg = `<span class="text-blue-400">${msg}</span>`;
                            }
                            return `<div><span class="text-slate-500 opacity-50">[${time}]</span> ${msg}</div>`;
                        }).join('');

                        // Autoscroll to bottom
                        logsWin.scrollTop = logsWin.scrollHeight;
                        lastLogsCount = logs.length;
                    }
                }

            } catch (err) {
                console.error('Error fetching dashboard data:', err);
            }
        }

        // --- Initialization ---
        window.onload = () => {
            fetchSettings();
            fetchDashboardData();
            // Auto refresh every 3 seconds
            setInterval(fetchDashboardData, 3000);
        };
    </script>
</body>
</html>
